services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: pf_db
      POSTGRES_USER: pf_db
      POSTGRES_PASSWORD: pf_db
    ports:
      - "${PF_DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pf_db -d pf_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
