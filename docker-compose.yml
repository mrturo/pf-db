services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: pf
      POSTGRES_USER: pf
      POSTGRES_PASSWORD: pf
    ports:
      # Default host port is 5432. During migration coexistence (while the old
      # per-project containers are still running), override in your local .env:
      #   PF_DB_PORT=5434
      - "${PF_DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pf -d pf"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
