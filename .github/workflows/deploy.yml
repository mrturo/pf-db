name: CI / Deploy migrations to Neon

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # check: lint only — safe for PRs, no DB access required
  # ------------------------------------------------------------------
  check:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: make check

  # ------------------------------------------------------------------
  # migrate: apply migrations + verify + migration-check + seed
  # Runs only on push to main — never on PRs.
  # migration-check (alembic check) runs after upgrade so the DB is at
  # head and the check can verify consistency rather than failing on
  # the new unapplied revision.
  # ------------------------------------------------------------------
  migrate:
    name: Migrate & Seed
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: alembic upgrade head

      - name: Verify DB is at migration head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: make migration-check

      - name: Install psql client
        run: sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Seed base data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # psql (libpq) needs postgresql:// and sslmode=, not ssl=
          PSQL_URL="${DATABASE_URL/postgresql+asyncpg/postgresql}"
          PSQL_URL="${PSQL_URL/ssl=require/sslmode=require}"
          psql "$PSQL_URL" --set ON_ERROR_STOP=1 -f db/02_seed_base.sql

  # ------------------------------------------------------------------
  # notify-failure: email alert when any job fails on push to main.
  # Uses explicit result checks instead of failure() to avoid false
  # positives — a skipped migrate job (e.g. on a PR) must not trigger
  # the alert.
  # Requires MAIL_SERVER / MAIL_PORT / MAIL_USERNAME / MAIL_PASSWORD /
  # MAIL_FROM / MAIL_TO secrets to be set in this repo's settings.
  # ------------------------------------------------------------------
  notify-failure:
    name: Notify — Failure
    runs-on: ubuntu-latest
    needs: [check, migrate]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.check.result == 'failure' || needs.migrate.result == 'failure')

    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ [pf-db] Pipeline failed — ${{ github.ref_name }}"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          body: |
            One or more jobs failed in the pf-db CI/CD pipeline.

            Branch:  ${{ github.ref_name }}
            Commit:  ${{ github.sha }}
            Author:  ${{ github.actor }}

            Run details:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # ------------------------------------------------------------------
  # notify-success: email confirmation after a successful full deploy
  # ------------------------------------------------------------------
  notify-success:
    name: Notify — Success
    runs-on: ubuntu-latest
    needs: [migrate]
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Send success email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ [pf-db] Migrations deployed — ${{ github.sha }}"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          body: |
            pf-db migrations deployed successfully to Neon.

            Branch:  ${{ github.ref_name }}
            Commit:  ${{ github.sha }}
            Author:  ${{ github.actor }}

            Run details:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
