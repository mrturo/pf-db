name: Deploy migrations to Neon

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: alembic upgrade head

      - name: Verify DB is at head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          alembic current 2>&1 | grep -q "(head)" || { echo "ERROR: DB is not at head"; exit 1; }

      - name: Install psql client
        run: sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Seed base data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # psql (libpq) needs postgresql:// and sslmode=, not ssl=
          PSQL_URL="${DATABASE_URL/postgresql+asyncpg/postgresql}"
          PSQL_URL="${PSQL_URL/ssl=require/sslmode=require}"
          psql "$PSQL_URL" --set ON_ERROR_STOP=1 -f db/02_seed_base.sql

      - name: Lint
        run: ruff check alembic/
