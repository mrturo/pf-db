name: Deploy migrations to Neon

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: alembic upgrade head

      - name: Verify DB is at head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          alembic current 2>&1 | grep -q "(head)" || { echo "ERROR: DB is not at head"; exit 1; }

      - name: Lint
        run: ruff check alembic/
