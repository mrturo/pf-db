name: Deploy migrations to Neon

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: alembic upgrade head

      - name: Verify no pending migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: alembic check

      - name: Lint
        run: ruff check alembic/
